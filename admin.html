<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hike Exp - Dashboard Soci</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="LOGO.png">
    <link rel="icon" type="image/png" sizes="512x512" href="LOGO.png">
    <link rel="apple-touch-icon" sizes="180x180" href="LOGO.png">
    <link rel="icon" type="image/png" href="LOGO.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f1f5f9; color: var(--dark); padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 20px; font-size: 22px; color: var(--dark); border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,204,113,0.2); }
        
        button {
            width: 100%; padding: 14px; background: var(--primary); border: none; color: white; 
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        button.secondary { background: #94a3b8; margin-top: 10px; }
        
        .hidden { display: none !important; }
        .search-box { background: var(--light); padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .tour-list { max-height: 400px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; }
        .tour-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; font-size: 14px; }
        .tour-item:last-child { border-bottom: none; }
        .tour-item:hover { background: #e8f5e9; }
        .tour-item .title { font-weight: bold; color: #1e293b; margin-bottom: 3px; }
        .tour-item .info { color: #64748b; font-size: 12px; margin-bottom: 4px; }
        .tour-item .details-box { background: #f1f5f9; padding: 6px; border-radius: 6px; font-size: 11px; margin-top: 6px; color: #475569; }

        .counter-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 10px 0; }
        .btn-counter { width: 50px; height: 50px; border-radius: 50%; font-size: 24px; background: #e2e8f0; color: var(--dark); display: flex; align-items: center; justify-content: center; user-select: none; cursor: pointer; }
        .btn-counter:active { background: #cbd5e1; }
        #displayNuoviPosti { font-size: 28px; font-weight: bold; min-width: 40px; text-align: center; }
        
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .badge-dispo { background: #dcfce7; color: #166534; }
        .badge-full { background: #fee2e2; color: #991b1b; }
        
        .loading { text-align: center; color: #64748b; font-style: italic; padding: 10px; }
        .form-box { background: var(--light); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <h2>Hike Exp - Dashboard Soci</h2>

    <!-- 1. LOGIN SCREEN -->
    <div id="sectionLogin">
        <div class="form-group">
            <label for="password">Inserisci la Password Admin:</label>
            <input type="password" id="password" placeholder="Password">
        </div>
        <button onclick="caricaTuttiITour()">Accedi e Carica Tour</button>
    </div>

    <!-- 2. MAIN DASHBOARD (RICERCA E SELEZIONE) -->
    <div id="sectionDashboard" class="hidden">
        <div class="search-box">
            <div class="form-group" style="margin-bottom: 8px;">
                <label>🔍 Cerca per Nome Tour:</label>
                <input type="text" id="searchNome" placeholder="Es: Tramonto, Campo Imperatore..." oninput="filtraI_Tour()">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>📅 Filtra per Data:</label>
                <input type="text" id="searchData" placeholder="Es: 14/06, luglio..." oninput="filtraI_Tour()">
            </div>
        </div>

        <label>Seleziona il tour per aggiungere prenotazioni:</label>
        <div id="loadingList" class="loading hidden">Caricamento in corso...</div>
        <div class="tour-list" id="listaContenitore">
            <!-- I tour filtrati appariranno qui dinamicamente -->
        </div>
        
        <button class="secondary" onclick="disconnetti()">Esci / Cambia Password</button>
    </div>

    <!-- 3. MODIFICA POSTI (NUOVO FORM PRENOTAZIONE) -->
    <div id="sectionModifica" class="hidden">
        <div style="background: #e0f2fe; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #0284c7;">
            <div id="editNomeTour" style="font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #0369a1;">-</div>
            <div id="editDettagli" style="font-size: 13px; color: #0f172a;">-</div>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 10px; text-align: center;">Aggiungi Nuova Prenotazione</h3>
        
        <div class="form-box">
            <div class="form-group">
                <label>👤 Nominativo (Obbligatorio):</label>
                <input type="text" id="nuovoNome" placeholder="Es: Mario Rossi">
            </div>
            
            <div class="form-group">
                <label>📞 Telefono (Facoltativo):</label>
                <input type="text" id="nuovoTelefono" placeholder="Es: 3331234567">
            </div>
            
            <div class="form-group">
                <label>🚲 Numero Posti/Bici (Obbligatorio):</label>
                <div class="counter-container">
                    <div class="btn-counter" onclick="cambiaPostiNuovi(-1)">-</div>
                    <div id="displayNuoviPosti">1</div>
                    <div class="btn-counter" onclick="cambiaPostiNuovi(1)">+</div>
                </div>
                <p style="font-size: 11px; color: #64748b; text-align: center; margin-top: -5px;">(Seleziona numero negativo per registrare una disdetta)</p>
            </div>
        </div>

        <button onclick="salvaNuovaPrenotazione()">Salva Prenotazione</button>
        <button class="secondary" onclick="tornaAllaLista()">Annulla e Torna alla Lista</button>
    </div>
</div>

<!-- LINK DI GOOGLE APPS SCRIPT PRESERVATO -->
<script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwz7SwD5wSzhO-Mtc_17gOj1ewHum5aoQ63yxjfnV5rCnjjNHyMYiYFowwX3u1tTEQ-/exec";</script>

<script>
    let tuttiITour = [];
    let tourSelezionato = null;

    window.onload = function() {
        const savedPass = localStorage.getItem("hike_admin_pass");
        if (savedPass) {
            document.getElementById("password").value = savedPass;
            caricaTuttiITour();
        }
    };

    function caricaTuttiITour() {
        const pass = document.getElementById("password").value;
        if (!pass) { return alert("Inserisci la password!"); }

        document.getElementById("loadingList").classList.remove("hidden");
        document.getElementById("listaContenitore").innerHTML = "";

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "get_all_tours", password: pass })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("loadingList").classList.add("hidden");
            if (data.success) {
                localStorage.setItem("hike_admin_pass", pass);
                tuttiITour = data.tours;
                
                document.getElementById("sectionLogin").classList.add("hidden");
                document.getElementById("sectionDashboard").classList.remove("hidden");
                document.getElementById("sectionModifica").classList.add("hidden");
                
                filtraI_Tour();
            } else {
                alert("Errore: " + data.error);
            }
        })
        .catch(err => {
            document.getElementById("loadingList").classList.add("hidden");
            alert("Errore di connessione o URL dello script non corretto.");
            console.error(err);
        });
    }

    function filtraI_Tour() {
        const queryNome = document.getElementById("searchNome").value.toLowerCase();
        const queryData = document.getElementById("searchData").value.toLowerCase();
        const contenitore = document.getElementById("listaContenitore");
        contenitore.innerHTML = "";

        // Otteniamo la data di OGGI a mezzanotte per il confronto
        const oggi = new Date();
        oggi.setHours(0, 0, 0, 0);

        const mesi = {
            "gennaio": 0, "febbraio": 1, "marzo": 2, "aprile": 3, "maggio": 4, "giugno": 5,
            "luglio": 6, "agosto": 7, "settembre": 8, "ottobre": 9, "novembre": 10, "dicembre": 11
        };

        const filtrati = tuttiITour.filter(t => {
            const dataGrezza = String(t.data || t.date || t.Data || t.Date || "").toLowerCase();
            
            // --- LOGICA ESCLUSIONE DATE PASSATE ---
            let meseNum = -1;
            for (let m in mesi) {
                if (dataGrezza.includes(m)) {
                    meseNum = mesi[m];
                    break;
                }
            }
            // Trova il primo numero nella stringa (es: "14 giugno" -> 14, "4 e 5 luglio" -> 4)
            const matchGiorno = dataGrezza.match(/\d+/);
            const giornoNum = matchGiorno ? parseInt(matchGiorno[0], 10) : 1;

            if (meseNum !== -1) {
                const dataTour = new Date(oggi.getFullYear(), meseNum, giornoNum);
                dataTour.setHours(0, 0, 0, 0);
                
                // Se la data del tour è strettamente precedente a oggi, la scartiamo
                if (dataTour < oggi) {
                    return false;
                }
            }
            // --------------------------------------

            const matchNome = t.nome.toLowerCase().includes(queryNome);
            const matchData = dataGrezza.includes(queryData);
            return matchNome && matchData;
        });

        if (filtrati.length === 0) {
            contenitore.innerHTML = '<div class="loading">Nessun tour in programma (o corrispondente ai filtri)</div>';
            return;
        }

        filtrati.forEach(t => {
            const item = document.createElement("div");
            item.className = "tour-item";
            item.onclick = () => apriModificaTour(t);
            
            const dataVisualizzata = t.data || t.date || t.Data || t.Date || 'Data N.D.';
            const badgeClass = t.disponibili > 0 ? "badge-dispo" : "badge-full";

            item.innerHTML = `
                <div class="title">${t.nome}</div>
                <div class="info" style="color: #1e293b;">📅 <strong>${dataVisualizzata}</strong> &nbsp;|&nbsp; ID: ${t.id}</div>
                <div class="details-box">
                    <strong>${t.occupati_totali}</strong> occupati su ${t.totali}<br>
                    (Sito/Manuale: <strong>${t.occupati_sito}</strong> | Majellando: <strong>${t.occupati_majellando}</strong>)
                </div>
                <span class="status-badge ${badgeClass}">Disponibili: ${t.disponibili}</span>
            `;
            contenitore.appendChild(item);
        });
    }

    function apriModificaTour(tour) {
        tourSelezionato = { ...tour }; 
        const dataVisualizzata = tourSelezionato.data || tourSelezionato.date || tourSelezionato.Data || tourSelezionato.Date || '-';
        
        document.getElementById("editNomeTour").innerText = tourSelezionato.nome;
        document.getElementById("editDettagli").innerHTML = `
            Data: <strong>${dataVisualizzata}</strong><br>
            Posti Rimasti: <strong>${tourSelezionato.disponibili}</strong> (su ${tourSelezionato.totali})
        `;
        
        document.getElementById("nuovoNome").value = "";
        document.getElementById("nuovoTelefono").value = "";
        document.getElementById("displayNuoviPosti").innerText = "1";
        
        document.getElementById("sectionDashboard").classList.add("hidden");
        document.getElementById("sectionModifica").classList.remove("hidden");
    }

    function cambiaPostiNuovi(valore) {
        let corr = parseInt(document.getElementById("displayNuoviPosti").innerText, 10) || 0;
        corr += valore;
        if (corr === 0) { 
            corr = (valore > 0) ? 1 : -1; 
        }
        document.getElementById("displayNuoviPosti").innerText = corr;
    }

    function salvaNuovaPrenotazione() {
        const pass = document.getElementById("password").value;
        const nome = document.getElementById("nuovoNome").value.trim();
        const telefono = document.getElementById("nuovoTelefono").value.trim();
        const numBici = parseInt(document.getElementById("displayNuoviPosti").innerText, 10);

        if (!nome) {
            alert("Il Nominativo è obbligatorio!");
            return;
        }
        if (!tourSelezionato) return;

        const testConferma = numBici > 0 
            ? `Vuoi confermare la prenotazione di ${numBici} posti per ${nome}?` 
            : `Stai registrando una DISDETTA di ${Math.abs(numBici)} posti per ${nome}. Confermi?`;
            
        if (!confirm(testConferma)) return;

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "add_manual_booking",
                password: pass,
                idTour: tourSelezionato.id,
                nome: nome,
                telefono: telefono,
                numBici: numBici
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("Registrata con successo!");
                caricaTuttiITour();
            } else {
                alert("Errore durante il salvataggio: " + data.error);
            }
        })
        .catch(err => alert("Errore di rete. Riprova."));
    }

    function tornaAllaLista() {
        document.getElementById("sectionModifica").classList.add("hidden");
        document.getElementById("sectionDashboard").classList.remove("hidden");
    }

    function disconnetti() {
        localStorage.removeItem("hike_admin_pass");
        document.getElementById("password").value = "";
        document.getElementById("sectionDashboard").classList.add("hidden");
        document.getElementById("sectionLogin").classList.remove("hidden");
    }
</script>

</body>
</html>

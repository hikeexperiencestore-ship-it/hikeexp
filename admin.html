<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hike Exp - Dashboard Soci</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="LOGO.png">
    <link rel="apple-touch-icon" sizes="180x180" href="LOGO.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f1f5f9; color: var(--dark); padding: 15px; }
        
        .container { 
            max-width: 500px; margin: 0 auto; background: white; padding: 20px; 
            border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: max-width 0.3s ease;
        }
        @media (min-width: 768px) {
            body { padding: 30px 15px; }
            .container { max-width: 900px; padding: 30px; }
            .search-box-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .search-box-grid .form-group { margin-bottom: 0 !important; }
            .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        }

        h2 { text-align: center; margin-bottom: 20px; font-size: 22px; color: var(--dark); border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        input[type="text"], input[type="password"], input[type="number"], input[type="date"], input[type="time"], input[type="email"], select {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,204,113,0.2); }
        
        button { width: 100%; padding: 14px; background: var(--primary); border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-dark); }
        button.secondary { background: #94a3b8; margin-top: 10px; }
        
        .hidden { display: none !important; }
        .search-box { background: var(--light); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .tour-list { max-height: 450px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; }
        .tour-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; font-size: 14px; }
        .tour-item:last-child { border-bottom: none; }
        .tour-item:hover { background: #e8f5e9; }
        .tour-item .title { font-weight: bold; color: #1e293b; margin-bottom: 3px; }
        .tour-item .info { color: #64748b; font-size: 12px; margin-bottom: 4px; }
        .tour-item .details-box { background: #f1f5f9; padding: 6px; border-radius: 6px; font-size: 11px; margin-top: 6px; color: #475569; border-left: 3px solid var(--primary); }

        .counter-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 10px 0; }
        .btn-counter { width: 50px; height: 50px; border-radius: 50%; font-size: 24px; background: #e2e8f0; color: var(--dark); display: flex; align-items: center; justify-content: center; user-select: none; cursor: pointer; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .badge-dispo { background: #dcfce7; color: #166534; }
        .badge-full { background: #fee2e2; color: #991b1b; }
        .loading { text-align: center; color: #64748b; font-style: italic; padding: 10px; }
        .form-box { background: var(--light); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .prenotazione-item { background: #f8fafc; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; font-size: 14px; text-align: left; }
        .prenotazione-item .nome { font-weight: bold; color: #0f172a; margin-bottom: 4px;}
        .prenotazione-item .dettagli { color: #475569; font-size: 13px; margin-bottom: 8px;}
        .badge-bici { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .btn-blue { background: #3b82f6; margin-top: 15px; }
        .btn-blue:hover { background: #2563eb; }
        .btn-yellow { background: #eab308; color: white; margin-bottom: 15px;}
        .btn-yellow:hover { background: #ca8a04; }
        
        .btn-storno { background: #f97316; font-size: 12px; padding: 8px; width: 100%; display: block; border-radius:6px; font-weight:bold; color:white; border:none; cursor:pointer;}
        .btn-storno:hover { background: #ea580c; }
        .btn-ok { background: #10b981; font-size: 12px; padding: 8px; width: 100%; cursor: default; border-radius:6px; font-weight:bold; color:white; border:none;}
    </style>
</head>
<body>

<div class="container">
    <h2>Hike Exp - Dashboard Soci</h2>

    <div id="sectionLogin">
        <div class="form-group"><label>Password Admin:</label><input type="password" id="password" placeholder="Password"></div>
        <button onclick="caricaTuttiITour()">Accedi e Carica</button>
    </div>

    <div id="sectionDashboard" class="hidden">
        <div style="display: flex; gap: 10px;">
            <button class="btn-yellow" style="flex:1;" onclick="apriPannelloNoleggi()">🚲 Gestione Noleggi</button>
            <button class="btn-yellow" style="flex:1; background: #8b5cf6;" onclick="apriCalendario()">📅 Calendario Noleggi</button>
        </div>

        <div class="search-box">
            <div class="search-box-grid">
                <div class="form-group"><label>🔍 Nome Tour:</label><input type="text" id="searchNome" oninput="filtraI_Tour()"></div>
                <div class="form-group"><label>📅 Data:</label><input type="text" id="searchData" oninput="filtraI_Tour()"></div>
            </div>
        </div>
        <label>Seleziona il tour per aggiungere prenotazioni:</label>
        <div id="loadingList" class="loading hidden">Caricamento...</div>
        <div class="tour-list" id="listaContenitore"></div>
        <button class="secondary" onclick="disconnetti()">Esci</button>
    </div>

    <div id="sectionModifica" class="hidden">
        <div style="background: #e0f2fe; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #0284c7;">
            <div id="editNomeTour" style="font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #0369a1;">-</div>
            <div id="editDettagli" style="font-size: 13px; color: #0f172a;">-</div>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 10px; text-align: center;">Nuova Prenotazione</h3>
        <div class="form-box">
            <div class="form-grid-2">
                <div class="form-group"><label>👤 Nominativo:</label><input type="text" id="nuovoNome"></div>
                <div class="form-group"><label>📞 Telefono:</label><input type="text" id="nuovoTelefono"></div>
            </div>
            <div class="form-group">
                <label>🚲 Numero Bici:</label>
                <div class="counter-container">
                    <div class="btn-counter" onclick="cambiaPostiNuovi(-1)">-</div>
                    <div id="displayNuoviPosti" style="font-size:24px; font-weight:bold;">1</div>
                    <div class="btn-counter" onclick="cambiaPostiNuovi(1)">+</div>
                </div>
            </div>
        </div>
        <button onclick="salvaNuovaPrenotazione()">Salva Prenotazione</button>
        <button class="secondary" onclick="tornaAllaLista()">Annulla</button>

        <button class="btn-blue" onclick="caricaListaPrenotati()">📋 Mostra Lista Prenotati</button>
        <div id="listaPrenotatiContainer" class="hidden" style="margin-top: 20px; border-top: 2px dashed var(--border); padding-top: 15px;">
            <div id="loadingPrenotati" class="loading hidden">Recupero in corso...</div>
            <div id="listaPrenotatiContent"></div>
        </div>
    </div>

    <div id="sectionNoleggi" class="hidden">
        <h3 style="text-align: center; margin-bottom: 15px; color: #1e293b;">Gestione Noleggi</h3>
        
        <div class="form-box" style="border: 1px solid #fcd34d; background: #fffbeb;">
            <h4 style="color: #b45309; margin-bottom: 10px;">Inserimento Manuale</h4>
            <form id="form-noleggio-manuale" onsubmit="inviaNoleggioManuale(event)">
                <div class="form-grid-2">
                    <div class="form-group"><label>Data:</label><input type="date" id="man-data" required></div>
                    <div class="form-group"><label>Ore Ritiro:</label><input type="time" id="man-orario" value="09:00" required></div>
                </div>
                <div class="form-grid-2">
                    <div class="form-group"><label>Nome:</label><input type="text" id="man-nome" required></div>
                    <div class="form-group"><label>Tel:</label><input type="text" id="man-telefono" required></div>
                </div>
                <div class="form-grid-2">
                    <div class="form-group"><label>Email:</label><input type="email" id="man-email"></div>
                    <div class="form-group"><label>Offerta:</label>
                        <select id="man-offerta" required>
                            <option value="" disabled selected>Caricamento offerte...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Note / Richieste:</label>
                    <input type="text" id="man-note" placeholder="Eventuali note...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;"><label>Bici:</label><input type="number" id="man-bici" value="1" required></div>
                    <div class="form-group" style="flex: 1;"><label>Carrello:</label><select id="man-carrellino"><option>No</option><option>Si</option></select></div>
                </div>
                <div class="form-group"><label>Altezze:</label><input type="text" id="man-altezze" required></div>
                
                <button type="submit" class="btn-yellow" style="margin-bottom: 0;">Registra Noleggio</button>
            </form>
        </div>

        <div style="margin-top: 25px;">
            <h4 style="text-align: center; margin-bottom: 15px;">📥 Richieste / Confermati</h4>
            <div id="loadingNoleggi" class="loading hidden">Sincronizzazione...</div>
            <div id="lista-noleggi-pendenti"></div>
        </div>
        <button class="secondary" onclick="tornaAiTour()" style="margin-top: 25px;">⬅ Torna ai Tour</button>
    </div>
</div>

<div id="modalCalendario" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; padding:15px; display:flex; justify-content:center; align-items:center;">
    <div style="background:white; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; padding:20px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid var(--border); padding-bottom:10px;">
            <h3 style="font-size:18px; color:var(--dark);">📅 Calendario Noleggi</h3>
            <button onclick="chiudiCalendario()" style="width:auto; padding:6px 12px; background:#ef4444; font-size:12px;">✕ Chiudi</button>
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="cambiaMeseCalendario(-1)" style="width:auto; padding:8px 12px; font-size:14px; background:#64748b;">◀ Mese Prec</button>
            <h4 id="titoloMeseAnno" style="font-size:16px; font-weight:bold; color:var(--dark);"></h4>
            <button onclick="cambiaMeseCalendario(1)" style="width:auto; padding:8px 12px; font-size:14px; background:#64748b;">Mese Succ ▶</button>
        </div>

        <div style="display:grid; grid-template-columns:repeat(7, 1fr); text-align:center; font-weight:bold; font-size:12px; color:#64748b; margin-bottom:5px;">
            <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
        </div>
        
        <div id="grid-calendario" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; margin-bottom:20px;"></div>
        
        <div id="dettaglio-giorno-container" style="background:#f8fafc; padding:15px; border-radius:10px; border:1px solid var(--border);">
            <h4 id="dataSelezionataTitolo" style="font-size:14px; color:#0f172a; margin-bottom:10px; border-bottom:1px solid #e2e8f0; padding-bottom:6px;">Seleziona un giorno verde nel calendario</h4>
            <div id="lista-noleggi-giorno"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwz7SwD5wSzhO-Mtc_17gOj1ewHum5aoQ63yxjfnV5rCnjjNHyMYiYFowwX3u1tTEQ-/exec";

    let tuttiITour = [];
    let tourSelezionato = null;
    let datiNoleggiGlobali = { pendenti: [], confermati: [], tours: [], CONFIG_NOLEGGI: [] }; 
    let calendarioNoleggiCache = [];
    let dataCorrenteCalendario = new Date();

    window.onload = function() {
        if (localStorage.getItem("hike_admin_pass")) {
            document.getElementById("password").value = localStorage.getItem("hike_admin_pass");
            caricaTuttiITour();
        }
    };

    function caricaTuttiITour() {
        const pass = document.getElementById("password").value;
        if (!pass) return alert("Inserisci la password!");

        document.getElementById("loadingList").classList.remove("hidden");
        document.getElementById("listaContenitore").innerHTML = "";

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "get_all_tours", password: pass }) })
        .then(res => res.json())
        .then(data => {
            document.getElementById("loadingList").classList.add("hidden");
            if (data.success) {
                localStorage.setItem("hike_admin_pass", pass);
                tuttiITour = data.tours;
                document.getElementById("sectionLogin").classList.add("hidden");
                document.getElementById("sectionDashboard").classList.remove("hidden");
                document.getElementById("sectionModifica").classList.add("hidden");
                document.getElementById("sectionNoleggi").classList.add("hidden");
                filtraI_Tour();
            } else { alert("Errore: " + data.error); }
        }).catch(err => alert("Errore di rete."));
    }

    function filtraI_Tour() {
        const qNome = document.getElementById("searchNome").value.toLowerCase();
        const qData = document.getElementById("searchData").value.toLowerCase();
        const cont = document.getElementById("listaContenitore");
        cont.innerHTML = "";

        const oggi = new Date();
        oggi.setHours(0, 0, 0, 0);

        const mesi = {
            "gennaio": 0, "febbraio": 1, "marzo": 2, "aprile": 3, "maggio": 4, "giugno": 5,
            "luglio": 6, "agosto": 7, "settembre": 8, "ottobre": 9, "novembre": 10, "dicembre": 11
        };

        const filtrati = tuttiITour.filter(t => {
            const dataGrezza = String(t.data || "").toLowerCase();
            
            let meseNum = -1;
            for (let m in mesi) {
                if (dataGrezza.includes(m)) { meseNum = mesi[m]; break; }
            }
            const matchGiorno = dataGrezza.match(/\d+/);
            const giornoNum = matchGiorno ? parseInt(matchGiorno[0], 10) : 1;
            const matchAnno = dataGrezza.match(/\b(20\d{2})\b/);
            const annoNum = matchAnno ? parseInt(matchAnno[1], 10) : oggi.getFullYear();

            if (meseNum !== -1) {
                const dataTour = new Date(annoNum, meseNum, giornoNum);
                dataTour.setHours(0, 0, 0, 0);
                if (dataTour < oggi) { return false; }
            }

            const matchTestoNome = t.nome.toLowerCase().includes(qNome);
            const matchTestoData = dataGrezza.includes(qData);
            return matchTestoNome && matchTestoData;
        });

        if (filtrati.length === 0) { cont.innerHTML = '<div class="loading">Nessun tour trovato</div>'; return; }

        filtrati.forEach(t => {
            const item = document.createElement("div");
            item.className = "tour-item";
            item.onclick = () => apriModificaTour(t);
            const badgeClass = t.disponibili > 0 ? "badge-dispo" : "badge-full";

            item.innerHTML = `
                <div class="title">${t.nome}</div>
                <div class="info">📅 <strong>${t.data || '-'}</strong> | ID: ${t.id}</div>
                <div class="details-box">
                    <strong>Riepilogo Assegnazioni:</strong><br>
                    - Sito/Manuale: <strong>${t.occupati_sito}</strong><br>
                    - Noleggi Sovrapposti: <strong>${t.noleggi}</strong><br>
                    - Majellando: <strong>${t.occupati_majellando}</strong> (di cui <strong>${t.ritiri_hike}</strong> ritiri hike)
                </div>
                <span class="status-badge ${badgeClass}">Disponibili: ${t.disponibili} su ${t.totali}</span>
            `;
            cont.appendChild(item);
        });
    }

    function apriModificaTour(tour) {
        tourSelezionato = { ...tour }; 
        document.getElementById("editNomeTour").innerText = tourSelezionato.nome;
        document.getElementById("editDettagli").innerHTML = `Data: <strong>${tourSelezionato.data||'-'}</strong><br>Disponibili: <strong>${tourSelezionato.disponibili}</strong> (su ${tourSelezionato.totali})`;
        document.getElementById("nuovoNome").value = "";
        document.getElementById("nuovoTelefono").value = "";
        document.getElementById("displayNuoviPosti").innerText = "1";
        
        document.getElementById("sectionDashboard").classList.add("hidden");
        document.getElementById("sectionModifica").classList.remove("hidden");
        document.getElementById("listaPrenotatiContainer").classList.add("hidden");
    }

    function cambiaPostiNuovi(val) {
        let corr = (parseInt(document.getElementById("displayNuoviPosti").innerText)||0) + val;
        if(corr === 0) corr = val > 0 ? 1 : -1;
        document.getElementById("displayNuoviPosti").innerText = corr;
    }

    function salvaNuovaPrenotazione() {
        const p = document.getElementById("password").value;
        const n = document.getElementById("nuovoNome").value.trim();
        const t = document.getElementById("nuovoTelefono").value.trim();
        const b = parseInt(document.getElementById("displayNuoviPosti").innerText);
        
        if(!n) return alert("Nominativo obbligatorio!");
        if(!confirm(b>0 ? `Confermi ${b} posti per ${n}?` : `DISDETTA ${Math.abs(b)} posti per ${n}?`)) return;

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "add_manual_booking", password: p, idTour: tourSelezionato.id, nome: n, telefono: t, numBici: b}) })
        .then(res => res.json()).then(d => { if(d.success){ alert("Ok!"); caricaTuttiITour(); } else alert("Errore"); });
    }

    function tornaAllaLista() { document.getElementById("sectionModifica").classList.add("hidden"); document.getElementById("sectionDashboard").classList.remove("hidden"); }
    function disconnetti() { localStorage.removeItem("hike_admin_pass"); location.reload(); }

    function caricaListaPrenotati() {
        document.getElementById("listaPrenotatiContainer").classList.remove("hidden");
        document.getElementById("loadingPrenotati").classList.remove("hidden");
        const cont = document.getElementById("listaPrenotatiContent");
        cont.innerHTML = "";

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "get_prenotazioni", password: document.getElementById("password").value, idTour: tourSelezionato.id}) })
        .then(res => res.json()).then(data => {
            document.getElementById("loadingPrenotati").classList.add("hidden");
            if (data.success) {
                if(data.prenotazioni.length===0) return cont.innerHTML = "Nessuna prenotazione.";
                data.prenotazioni.forEach(p => {
                    const div = document.createElement("div");
                    div.className = "prenotazione-item";
                    let btnHTML = p.stornato === "SI" 
                        ? `<button class="btn-ok">✅ Già Stornato su Majellando</button>`
                        : `<button class="btn-storno" onclick="flagStornato(${p.riga})">🔄 Segna come Stornato su Majellando</button>`;
                    
                    let noteHTML = p.richieste ? `<div style="margin-top:4px; font-size:12px; color:#b45309;">📝 Note: ${p.richieste}</div>` : "";
                    
                    div.innerHTML = `
                        <div class="nome">👤 ${p.nominativo}</div>
                        <div class="dettagli">📞 ${p.telefono||'-'} <br>🚲 Bici: <span class="badge-bici">${p.num_bici}</span></div>
                        ${noteHTML}
                        <div style="margin-top:8px;">${btnHTML}</div>
                    `;
                    cont.appendChild(div);
                });
            }
        });
    }

    function flagStornato(riga) {
        if(!confirm("Hai già rimosso fisicamente questi posti da Majellando? Il sistema riequilibrerà la disponibilità.")) return;
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "flag_stornato_tour", password: document.getElementById("password").value, riga: riga}) })
        .then(res => res.json()).then(d => { if(d.success){ alert("Storno registrato!"); caricaListaPrenotati(); caricaTuttiITour(); } });
    }

    async function apriPannelloNoleggi() {
        document.getElementById("sectionDashboard").classList.add("hidden");
        document.getElementById("sectionNoleggi").classList.remove("hidden");
        await caricaPannelloNoleggi();
    }
    
    function tornaAiTour() { 
        document.getElementById("sectionNoleggi").classList.add("hidden"); 
        document.getElementById("sectionDashboard").classList.remove("hidden"); 
    }

    async function caricaPannelloNoleggi() {
        document.getElementById("loadingNoleggi").classList.remove("hidden");
        document.getElementById("lista-noleggi-pendenti").innerHTML = "";
        
        const resNoleggi = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "get_noleggi_pendenti", password: document.getElementById("password").value}) }).then(r=>r.json());
        const resOfferte = await fetch(SCRIPT_URL).then(r=>r.json());
        
        document.getElementById("loadingNoleggi").classList.add("hidden");
        
        if(resNoleggi.success){ 
            datiNoleggiGlobali = resNoleggi; 
            if(resOfferte && resOfferte.CONFIG_NOLEGGI) {
                popolaSelectOfferteManuali(resOfferte.CONFIG_NOLEGGI);
            }
            renderizzaNoleggi(); 
        }
    }

    function popolaSelectOfferteManuali(offerte) {
        const sel = document.getElementById("man-offerta");
        if(sel) {
            sel.innerHTML = "";
            offerte.forEach(o => {
                sel.innerHTML += `<option value="${o.nome}">${o.nome} (${o.prezzo ? '€'+o.prezzo : ''})</option>`;
            });
        }
    }

    function renderizzaNoleggi() {
        const cont = document.getElementById("lista-noleggi-pendenti");
        cont.innerHTML = "";
        const listaCompleta = [...datiNoleggiGlobali.pendenti, ...datiNoleggiGlobali.confermati];
        const mesiNomi = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];

        listaCompleta.forEach(nol => {
            const div = document.createElement("div");
            div.className = "prenotazione-item";
            
            let checkboxesTours = "";
            let [gg, mm, aaaa] = ["", "", ""];
            let dataStringa = nol.dataNoleggio ? nol.dataNoleggio.toString().trim() : "";
            
            let matchITA = dataStringa.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
            let matchISO = dataStringa.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);

            if (matchITA) { gg = parseInt(matchITA[1],10); mm = parseInt(matchITA[2],10); }
            else if (matchISO) { gg = parseInt(matchISO[3],10); mm = parseInt(matchISO[2],10); }

            if (gg && mm) {
                let meseNome = mesiNomi[mm - 1];
                let tourFiltrati = datiNoleggiGlobali.tours.filter(t => {
                    if (!t.data) return false;
                    let dt = t.data.toLowerCase();
                    return new RegExp(`\\b${gg}\\b`).test(dt) && dt.includes(meseNome);
                });
                
                if (tourFiltrati.length > 0) {
                    checkboxesTours = tourFiltrati.map(t => 
                        `<label style="display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer; background:#fff; padding:6px; border-radius:6px; border:1px solid #e2e8f0;">
                            <input type="checkbox" class="chk-tour-${nol.riga}" value="${t.id}" style="width:18px; height:18px; margin:0; flex-shrink:0;">
                            <span style="font-size:13px; color:#1e293b;">${t.nome} (${t.data})</span>
                        </label>`
                    ).join("");
                } else {
                    checkboxesTours = `<div style="padding:8px; color:#b45309; font-size:12px; font-style:italic;">Nessun tour programmato in questa data.</div>`;
                }
            } else {
                checkboxesTours = `<div style="padding:8px; color:#ef4444; font-size:12px;">Data in formato non riconosciuto.</div>`;
            }

            let bloccoStorno = "";
            if (nol.tour_collegato === "BICI_PARTNER") {
                bloccoStorno = `<div style="background:#f3e8ff; border-left:4px solid #a855f7; color:#7e22ce; padding:10px; border-radius:6px; font-size:12px; margin-top:10px; font-weight:bold;">🤝 Bici Partner: Nessun posto stornato.</div>`;
            } else if (nol.tour_collegato) {
                bloccoStorno = `<div style="background:#dcfce7; border-left:4px solid #22c55e; color:#166534; padding:10px; border-radius:6px; font-size:12px; margin-top:10px; font-weight:bold;">✅ Scalato dai Tour ID: ${nol.tour_collegato}</div>`;
            } else {
                bloccoStorno = `
                    <div style="background:#f1f5f9; padding:12px; border-radius:8px; font-size:12px; margin-top:10px; border: 1px solid var(--border);">
                        <strong style="display:block; margin-bottom:8px; color:var(--dark);">🔗 Seleziona i Tour da cui stornare i posti:</strong>
                        <div style="margin-bottom:12px; max-height:140px; overflow-y:auto; padding-right:5px;">
                            ${checkboxesTours}
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-storno" style="flex:1; border-radius:6px; padding:10px;" onclick="collegaNoleggioTour(${nol.riga})">📉 Storna Selezionati</button>
                            <button style="flex:1; background:#8b5cf6; color:white; border:none; border-radius:6px; font-size:12px; font-weight:bold; cursor:pointer; padding:10px;" onclick="segnaNoleggioEsterno(${nol.riga})">🤝 Usa Bici Partner</button>
                        </div>
                    </div>`;
            }

            let azioniHTML = "";
            if (!datiNoleggiGlobali.confermati.find(c => c.riga === nol.riga)) {
                azioniHTML = `<div style="display:flex; gap:10px; margin-top:10px;"><button style="background:#10b981; font-size:13px; padding:10px; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer;" onclick="gestisciNol(${nol.riga}, 'Confermato')">✅ Conferma</button><button style="background:#ef4444; font-size:13px; padding:10px; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer;" onclick="gestisciNol(${nol.riga}, 'Rifiutato')">❌ Rifiuta</button></div>`;
            }

            let noteHTML = nol.note ? `<div style="margin-top:8px; font-size:12px; color:#b45309; background:#fffbeb; padding:8px; border-radius:6px; border-left:3px solid #d97706;"><strong>📝 Note:</strong> ${nol.note}</div>` : "";
            let testoOrario = nol.orario ? `⏰ ${nol.orario}` : `⏰ N/D`;

            // WhatsApp Logic
            let waPhone = nol.telefono ? String(nol.telefono).replace(/[^0-9]/g, '') : "";
            if (waPhone && !waPhone.startsWith('39') && waPhone.length >= 9) waPhone = '39' + waPhone;
            let textWA = encodeURIComponent(`Ciao ${nol.nome}, ti ricordiamo la tua prenotazione E-Bike con Hike Experience per domani alle ore ${nol.orario || 'N/D'} (${nol.numBici} bici). Ti aspettiamo presso il nostro Hike Point! Per qualsiasi info rispondi a questo messaggio.`);
            
            let btnWA = waPhone ? `<button style="background:#25D366; font-size:13px; padding:10px; margin-top:10px; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; width:100%; display:block;" onclick="window.open('https://wa.me/${waPhone}?text=${textWA}', '_blank')">💬 Invia Promemoria WhatsApp</button>` : `<div style="font-size:11px; color:#ef4444; margin-top:10px;">Nessun telefono per WhatsApp</div>`;

            div.innerHTML = `
                <div class="nome" style="font-size:15px; margin-bottom:6px;">👤 ${nol.nome} <span style="float:right; font-size:12px; color:#64748b;">[${nol.dataNoleggio} - ${testoOrario}]</span></div>
                <div class="dettagli" style="margin-bottom:0;">
                    🏷️ Offerta: <strong>${nol.offerta}</strong><br>
                    🚲 Bici: <span class="badge-bici">${nol.numBici}</span> (Altezze: ${nol.altezze})<br>📞 Tel: ${nol.telefono}
                </div>
                ${noteHTML}
                ${azioniHTML}
                ${bloccoStorno}
                ${btnWA}
            `;
            cont.appendChild(div);
        });
    }

    function segnaNoleggioEsterno(rigaNol) {
        if(!confirm("Confermi di usare BICI PARTNER / ESTERNE per questo noleggio?\n\nNon verranno scalati posti dai tuoi Tour su Majellando.")) return;
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "segna_noleggio_esterno", password: document.getElementById("password").value, riga: rigaNol}) })
        .then(res => res.json()).then(d => { 
            if(d.success){ alert("Noleggio contrassegnato con successo (Bici Partner)!"); caricaPannelloNoleggi(); } 
            else { alert("Errore di rete."); }
        });
    }

    function collegaNoleggioTour(rigaNol) {
        const checkboxes = document.querySelectorAll(`.chk-tour-${rigaNol}:checked`);
        const selIds = Array.from(checkboxes).map(chk => chk.value);
        if (selIds.length === 0) return alert("Devi spuntare almeno un Tour dalla lista!");
        const msg = selIds.length > 1 ? `Confermi di bloccare questi posti per i ${selIds.length} Tour selezionati?` : `Confermi di bloccare questi posti per il Tour selezionato?`;
        if (!confirm(msg)) return;
        
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "collega_noleggio_tour", password: document.getElementById("password").value, riga: rigaNol, idTours: selIds}) })
        .then(res => res.json()).then(d => { if(d.success){ alert("Storno effettuato!"); caricaPannelloNoleggi(); } });
    }

    function gestisciNol(riga, stato) {
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({action: "gestisci_noleggio", password: document.getElementById("password").value, riga: riga, nuovoStato: stato}) })
        .then(res => res.json()).then(d => { if(d.success){ caricaPannelloNoleggi(); } });
    }
    
    function inviaNoleggioManuale(e) {
        e.preventDefault();
        const p = { 
            action: "add_manual_noleggio", 
            password: document.getElementById("password").value, 
            dataNoleggio: document.getElementById("man-data").value, 
            nome: document.getElementById("man-nome").value, 
            telefono: document.getElementById("man-telefono").value, 
            email: document.getElementById("man-email").value, 
            numBici: document.getElementById("man-bici").value, 
            altezze: document.getElementById("man-altezze").value, 
            carrellino: document.getElementById("man-carrellino").value,
            offerta: document.getElementById("man-offerta") ? document.getElementById("man-offerta").value : "",
            note: document.getElementById("man-note") ? document.getElementById("man-note").value : "",
            orario: document.getElementById("man-orario") ? document.getElementById("man-orario").value : ""
        };
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(p) }).then(res => res.json()).then(d => { 
            if(d.success){ alert("Noleggio inserito!"); document.getElementById("form-noleggio-manuale").reset(); caricaPannelloNoleggi(); } 
        });
    }

    async function apriCalendario() {
        document.getElementById("modalCalendario").classList.remove("hidden");
        const pass = document.getElementById("password").value;
        
        const res = await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "get_noleggi_calendario", password: pass }) 
        }).then(r => r.json());
        
        if (res.success) {
            calendarioNoleggiCache = res.noleggi;
            disegnaMeseCalendario();
        } else {
            alert("Errore caricamento calendario.");
        }
    }

    function chiudiCalendario() {
        document.getElementById("modalCalendario").classList.add("hidden");
    }

    function cambiaMeseCalendario(direzione) {
        dataCorrenteCalendario.setMonth(dataCorrenteCalendario.getMonth() + direzione);
        disegnaMeseCalendario();
    }

    function disegnaMeseCalendario() {
        const anno = dataCorrenteCalendario.getFullYear();
        const mese = dataCorrenteCalendario.getMonth();
        
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        document.getElementById("titoloMeseAnno").innerText = `${nomiMesi[mese]} ${anno}`;
        
        const grid = document.getElementById("grid-calendario");
        grid.innerHTML = "";
        
        const primoGiornoIndex = new Date(anno, mese, 1).getDay();
        const offset = (primoGiornoIndex === 0) ? 6 : primoGiornoIndex - 1;
        const ultimoGiorno = new Date(anno, mese + 1, 0).getDate();
        
        for (let i = 0; i < offset; i++) {
            let emptyCell = document.createElement("div");
            grid.appendChild(emptyCell);
        }
        
        for (let giorno = 1; giorno <= ultimoGiorno; giorno++) {
            let mFormatted = String(mese + 1).padStart(2, '0');
            let gFormatted = String(giorno).padStart(2, '0');
            let dateStr = `${anno}-${mFormatted}-${gFormatted}`;
            
            const noleggiGiorno = calendarioNoleggiCache.filter(n => n.data === dateStr);
            const haNoleggi = noleggiGiorno.length > 0;
            
            let cell = document.createElement("div");
            cell.style = `
                padding: 10px 4px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: bold;
                cursor: pointer; border: 1px solid #e2e8f0;
                background: ${haNoleggi ? '#dcfce7' : '#ffffff'};
                color: ${haNoleggi ? '#166534' : '#64748b'};
            `;
            cell.innerHTML = `${giorno}${haNoleggi ? '<div style="font-size:10px; margin-top:2px;">🚲'+noleggiGiorno.reduce((acc, curr)=>acc+Number(curr.numBici), 0)+'</div>' : ''}`;
            
            cell.onclick = () => mostraDettaglioGiorno(dateStr, noleggiGiorno);
            grid.appendChild(cell);
        }
    }

    function mostraDettaglioGiorno(dateStr, noleggi) {
        document.getElementById("dataSelezionataTitolo").innerText = `📅 Dettaglio Noleggi del ${dateStr.split('-').reverse().join('/')}`;
        const container = document.getElementById("lista-noleggi-giorno");
        container.innerHTML = "";
        
        if (noleggi.length === 0) {
            container.innerHTML = `<p style="font-size:13px; color:#64748b; font-style:italic; text-align:center; padding:10px;">Nessun noleggio registrato in questa data.</p>`;
            return;
        }
        
        const categorie = ["Mezza giornata mattina", "Mezza giornata pomeriggio", "Giornata Intera"];
        let htmlContent = "";
        
        categorie.forEach(cat => {
            const elementiCat = noleggi.filter(n => n.categoria === cat);
            if (elementiCat.length > 0) {
                htmlContent += `<div style="font-weight:bold; font-size:13px; color:var(--primary-dark); margin-top:8px; margin-bottom:4px; text-transform:uppercase;">🔹 ${cat}</div>`;
                
                elementiCat.forEach(n => {
                    let infoDurata = n.infoGiorno ? ` (Giorno ${n.infoGiorno})` : '';
                    htmlContent += `
                        <div style="background:white; padding:8px 12px; border-radius:6px; margin-bottom:5px; border:1px solid #e2e8f0; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>👤 ${n.nome}</strong>${infoDurata} <br>
                                <small style="color:#64748b;">📞 ${n.telefono} | ⏰ Ritiro: <strong>${n.orario}</strong></small>
                            </div>
                            <div style="text-align:right;">
                                <span class="badge-bici">🚲 ${n.numBici} bici</span>
                            </div>
                        </div>
                    `;
                });
            }
        });
        
        container.innerHTML = htmlContent;
    }
</script>
</body>
</html>

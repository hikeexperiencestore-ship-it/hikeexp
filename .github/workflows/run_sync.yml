name: Run Majellando Sync

on:
  schedule:
    # Esegue il controllo alle 09:00, 14:00 e 19:00 UTC (11:00, 16:00 e 21:00 italiane)
    - cron: '0 9,14,19 * * *'
  workflow_dispatch: # Permette di avviarlo a mano con un click!

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        env:
          GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL }}
          PASSWORD_ADMIN: ${{ secrets.PASSWORD_ADMIN }}
        run: python sync.py

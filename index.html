<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hike Experience - Prenotazioni</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4">

    <header class="max-w-2xl mx-auto text-center py-8">
        <h1 class="text-3xl font-bold text-emerald-700">Prenota la tua Avventura</h1>
        <p class="text-slate-500 mt-2">Seleziona il tour e verifica la disponibilità in tempo reale.</p>
    </header>

    <div id="tour-container" class="max-w-2xl mx-auto space-y-4">
        <p class="text-center">Caricamento disponibilità...</p>
    </div>

    <!-- Modale Prenotazione -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Prenota Tour</h2>
            <form id="bookingForm" onsubmit="submitForm(event)">
                <input type="hidden" name="id_tour" id="id_tour">
                <input type="hidden" name="escursione" id="nome_tour">
                
                <label class="block text-sm font-bold mb-1">Nome</label>
                <input type="text" name="name" required class="w-full border p-2 rounded mb-3">
                
                <label class="block text-sm font-bold mb-1">Email</label>
                <input type="email" name="email" required class="w-full border p-2 rounded mb-3">
                
                <label class="block text-sm font-bold mb-1">Telefono</label>
                <input type="tel" name="phone" required class="w-full border p-2 rounded mb-3">
                
                <label class="block text-sm font-bold mb-1">Numero Bici</label>
                <input type="number" name="numero_bici" value="1" min="1" class="w-full border p-2 rounded mb-3">
                
                <label class="block text-sm font-bold mb-1">Altezza (cm)</label>
                <input type="text" name="altezza" required class="w-full border p-2 rounded mb-4">
                
                <button type="submit" id="btnSubmit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Conferma Prenotazione</button>
                <button type="button" onclick="closeModal()" class="w-full mt-2 text-slate-400">Annulla</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwz7SwD5wSzhO-Mtc_17gOj1ewHum5aoQ63yxjfnV5rCnjjNHyMYiYFowwX3u1tTEQ-/exec";
        const CSV_URL = "INSERISCI_QUI_IL_LINK_CSV"; // <--- INSERISCI QUI IL TUO LINK CSV PUBBLICATO

        async function init() {
            try {
                // Carica contemporaneamente disponibilità (JSON) e tour (CSV)
                const [respDisp, respCsv] = await Promise.all([
                    fetch(SCRIPT_URL),
                    fetch(CSV_URL)
                ]);
                const dispData = await respDisp.json();
                const csvText = await respCsv.text();
                
                renderTour(csvText, dispData);
            } catch(e) {
                document.getElementById('tour-container').innerHTML = "Errore caricamento dati. Controlla il link CSV.";
                console.error(e);
            }
        }

        function renderTour(csvText, dispData) {
            const rows = csvText.split('\n').slice(1); // Salta intestazione
            const container = document.getElementById('tour-container');
            container.innerHTML = "";

            rows.forEach(row => {
                const cols = row.split(',');
                if(cols.length < 6) return;
                
                const id = cols[0];
                const data = cols[1] + " " + cols[2];
                const nome = cols[5];
                const dispo = dispData[id] ? dispData[id].posti_disponibili : 0;

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <h3 class="font-bold">${nome}</h3>
                        <p class="text-sm text-slate-500">${data}</p>
                        <p class="text-xs font-semibold ${dispo > 0 ? 'text-emerald-600' : 'text-red-500'}">
                            ${dispo > 0 ? 'Posti disponibili: ' + dispo : 'ESAURITO'}
                        </p>
                    </div>
                    <button ${dispo > 0 ? '' : 'disabled'} onclick="openModal('${id}', '${nome}')" 
                    class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm disabled:opacity-50">Prenota</button>
                `;
                container.appendChild(card);
            });
        }

        function openModal(id, nome) {
            document.getElementById('id_tour').value = id;
            document.getElementById('nome_tour').value = nome;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Invio in corso...";
            
            const formData = new FormData(e.target);
            await fetch(SCRIPT_URL, { method: 'POST', body: formData });
            
            alert("Prenotazione effettuata!");
            closeModal();
            location.reload(); // Ricarica per aggiornare posti
        }

        init();
    </script>
</body>
</html>

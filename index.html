<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Tour E-Bike 2026 - Hike Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-10">

    <header class="bg-white border-b shadow-sm py-6 text-center">
        <h1 class="text-2xl font-bold text-emerald-700">Hike Experience 2026</h1>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        <div class="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl">
            <h2 class="font-bold text-emerald-800">Noleggio E-Bike Libero</h2>
            <p class="text-sm text-emerald-600 mb-4">Pedala in totale autonomia.</p>
            <button onclick="apriPrenotazione('NOLEGGIO', 'Noleggio Libero')" class="w-full bg-emerald-600 text-white font-bold py-2 rounded-xl">Prenota Ora</button>
        </div>

        <div id="calendario-lista" class="space-y-4">
            <p class="text-center text-slate-400">Caricamento tour...</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h2 id="modal-title" class="font-bold text-xl mb-4">Prenota</h2>
            <form id="form-prenotazione" onsubmit="inviaDati(event)">
                <input type="hidden" name="id_tour" id="in-id">
                <input type="hidden" name="escursione" id="in-nome">
                <input type="text" name="name" placeholder="Nome e Cognome" required class="w-full border p-2 rounded mb-2">
                <input type="email" name="email" placeholder="Email" required class="w-full border p-2 rounded mb-2">
                <input type="tel" name="phone" placeholder="Telefono" required class="w-full border p-2 rounded mb-2">
                <input type="number" name="numero_bici" placeholder="N. Bici" value="1" min="1" class="w-full border p-2 rounded mb-2">
                <input type="text" name="altezza" placeholder="Altezza (cm)" required class="w-full border p-2 rounded mb-2">
                <button type="submit" id="btn-invia" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl mt-2">Conferma Prenotazione</button>
                <button type="button" onclick="chiudiModale()" class="w-full text-slate-400 mt-3 text-sm">Annulla</button>
            </form>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwz7SwD5wSzhO-Mtc_17gOj1ewHum5aoQ63yxjfnV5rCnjjNHyMYiYFowwX3u1tTEQ-/exec";

        function apriPrenotazione(id, nome) {
            document.getElementById('in-id').value = id;
            document.getElementById('in-nome').value = nome;
            document.getElementById('modal-title').innerText = "Prenota: " + nome;
            document.getElementById('modal').classList.remove('hidden');
        }

        function chiudiModale() { document.getElementById('modal').classList.add('hidden'); }

        async function inviaDati(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-invia');
            btn.innerText = "Invio in corso...";
            
            const formData = new FormData(e.target);
            try {
                const res = await fetch(URL_SCRIPT, { method: 'POST', body: formData });
                const json = await res.json();
                if(json.result === "success") {
                    alert("Prenotazione effettuata con successo!");
                    chiudiModale();
                    location.reload();
                }
            } catch(err) {
                alert("Errore nell'invio, riprova.");
            }
            btn.innerText = "Conferma Prenotazione";
        }
    </script>
</body>
</html>
